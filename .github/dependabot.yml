version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(dev-deps)'
    ignore:
      # Tailwind v4 is a large, breaking migration; stay on the stable v3 line.
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
      # TypeScript majors break typescript-eslint's peer range (npm ci ERESOLVE)
      # until the ecosystem catches up. Minor/patch updates still flow.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
    groups:
      # Batch low-risk dev tooling bumps into a single PR.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'ci(deps)'
    groups:
      github-actions:
        patterns:
          - '*'
